name: build

# Builds every part of the gvpn monorepo: shared Go core, Linux server,
# and the Windows / Android / iOS clients.
#
# The project is greenfield: each job first detects whether its component
# exists and skips cleanly if not, so the pipeline stays green until the
# corresponding code lands. As each component is implemented, its build
# steps start running automatically.
#
# NOTE: the GOST TLS native dependency (OpenSSL 3.x + the GOST *engine*) must be
# provisioned per runner before the CGO build can succeed. The apt steps below
# install the OpenSSL headers (libssl-dev) and the gost engine
# (libengine-gost-openssl); the core/gosttls package loads the engine at runtime
# via ENGINESDIR, so no openssl.cnf wiring is needed. Background: risk #2 in
# docs/superpowers/specs/2026-06-13-gvpn-transport-design.md.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  core:
    name: Shared Go core (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -f core/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::core/ not implemented yet — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install GOST/OpenSSL build deps
        if: steps.detect.outputs.present == 'true'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libengine-gost-openssl
      - name: Vet & test
        if: steps.detect.outputs.present == 'true'
        working-directory: core
        env:
          CGO_ENABLED: "1"
        run: |
          go vet ./...
          go test -race ./...

  server:
    name: Linux server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -f server/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::server/ not implemented yet — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install GOST/OpenSSL build deps
        if: steps.detect.outputs.present == 'true'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libengine-gost-openssl
      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: server
        env:
          CGO_ENABLED: "1"
        run: go build -o ../dist/gvpn-server ./...
      - name: Upload artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gvpn-server-linux
          path: dist/gvpn-server

  windows:
    name: Windows client (Wails)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        shell: bash
        run: |
          if [ -f client/windows/go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::client/windows/ not implemented yet — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Wails CLI
        if: steps.detect.outputs.present == 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: client/windows
        run: wails build -platform windows/amd64
      - name: Upload artifact
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gvpn-windows
          path: client/windows/build/bin/

  android:
    name: Android client (gomobile + gradle)
    runs-on: ubuntu-latest
    env:
      OPENSSL_VERSION: "3.3.2"
      NDK_VERSION: "26.3.11579264"
      ANDROID_API: "21"
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -f client/android/settings.gradle.kts ] || [ -f client/android/settings.gradle ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::client/android/ app not present — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3
      - name: Install NDK
        if: steps.detect.outputs.present == 'true'
        run: sdkmanager --install "ndk;${NDK_VERSION}"
      - name: Cache cross-built OpenSSL
        if: steps.detect.outputs.present == 'true'
        id: ossl-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/openssl-android
          key: openssl-${{ env.OPENSSL_VERSION }}-arm64-v8a-ndk${{ env.NDK_VERSION }}
      - name: Cross-build OpenSSL for Android
        if: steps.detect.outputs.present == 'true' && steps.ossl-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: arm64-v8a
          PREFIX: ${{ github.workspace }}/openssl-android/arm64-v8a
        run: bash scripts/android/build-openssl-android.sh
      - name: Cross-build gost engine for Android
        if: steps.detect.outputs.present == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: arm64-v8a
          OPENSSL_PREFIX: ${{ github.workspace }}/openssl-android/arm64-v8a
          PREFIX: ${{ github.workspace }}/gost-engine-android/arm64-v8a
        run: bash scripts/android/build-gost-engine-android.sh
      - name: gomobile bind core/mobile -> app/libs/gvpn-core.aar
        if: steps.detect.outputs.present == 'true'
        working-directory: core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/openssl-android/arm64-v8a/lib/pkgconfig:${{ github.workspace }}/gost-engine-android/arm64-v8a/lib/pkgconfig
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          go get golang.org/x/mobile/bind
          gomobile init
          mkdir -p "$GITHUB_WORKSPACE/client/android/app/libs"
          gomobile bind -target=android/arm64 -androidapi "${ANDROID_API}" \
            -o "$GITHUB_WORKSPACE/client/android/app/libs/gvpn-core.aar" ./mobile
      - name: Set up Gradle
        if: steps.detect.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Assemble debug APK + unit tests
        if: steps.detect.outputs.present == 'true'
        working-directory: client/android
        run: gradle --no-daemon assembleDebug testDebugUnitTest
      - name: Upload APK
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gvpn-android-apk
          path: client/android/app/build/outputs/apk/debug/*.apk

  android-aar:
    name: Android core .aar (gomobile)
    runs-on: ubuntu-latest
    env:
      OPENSSL_VERSION: "3.3.2"
      NDK_VERSION: "26.3.11579264"
      ANDROID_API: "21"
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -f scripts/android/build-openssl-android.sh ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::scripts/android/ not present — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3
      - name: Install NDK
        if: steps.detect.outputs.present == 'true'
        run: sdkmanager --install "ndk;${NDK_VERSION}"
      - name: Cache cross-built OpenSSL
        if: steps.detect.outputs.present == 'true'
        id: ossl-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/openssl-android
          key: openssl-${{ env.OPENSSL_VERSION }}-arm64-v8a-ndk${{ env.NDK_VERSION }}
      - name: Cross-build OpenSSL for Android
        if: steps.detect.outputs.present == 'true' && steps.ossl-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: arm64-v8a
          PREFIX: ${{ github.workspace }}/openssl-android/arm64-v8a
        run: bash scripts/android/build-openssl-android.sh
      - name: Cross-build gost engine for Android
        if: steps.detect.outputs.present == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: arm64-v8a
          OPENSSL_PREFIX: ${{ github.workspace }}/openssl-android/arm64-v8a
          PREFIX: ${{ github.workspace }}/gost-engine-android/arm64-v8a
        run: bash scripts/android/build-gost-engine-android.sh
      - name: gomobile bind core/mobile -> .aar
        if: steps.detect.outputs.present == 'true'
        working-directory: core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/openssl-android/arm64-v8a/lib/pkgconfig:${{ github.workspace }}/gost-engine-android/arm64-v8a/lib/pkgconfig
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          # Recent gomobile requires golang.org/x/mobile in the bound module's
          # dependency graph; add it as a tool dependency (ephemeral in CI).
          go get golang.org/x/mobile/bind
          gomobile init
          gomobile bind -target=android/arm64 -androidapi "${ANDROID_API}" \
            -o "$GITHUB_WORKSPACE/gvpn-core.aar" ./mobile
      - name: Upload .aar
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gvpn-core-aar
          path: gvpn-core.aar

  android-engine-smoke:
    name: Android GOST on-device (engine + handshake)
    runs-on: ubuntu-latest
    env:
      OPENSSL_VERSION: "3.3.2"
      NDK_VERSION: "26.3.11579264"
      ANDROID_API: "21"
      EMU_API: "30"
      EMU_ARCH: "x86_64"
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -f scripts/android/build-gost-engine-android.sh ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::gost engine script not present — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3
      - name: Install NDK
        if: steps.detect.outputs.present == 'true'
        run: sdkmanager --install "ndk;${NDK_VERSION}"
      - name: Cross-build OpenSSL (x86_64)
        if: steps.detect.outputs.present == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: x86_64
          PREFIX: ${{ github.workspace }}/openssl-android/x86_64
        run: bash scripts/android/build-openssl-android.sh
      - name: Cross-build gost engine (x86_64)
        if: steps.detect.outputs.present == 'true'
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ABI: x86_64
          OPENSSL_PREFIX: ${{ github.workspace }}/openssl-android/x86_64
          PREFIX: ${{ github.workspace }}/gost-engine-android/x86_64
        run: bash scripts/android/build-gost-engine-android.sh
      - name: Build self-test binary (android/amd64)
        if: steps.detect.outputs.present == 'true'
        working-directory: core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/openssl-android/x86_64/lib/pkgconfig:${{ github.workspace }}/gost-engine-android/x86_64/lib/pkgconfig
        run: |
          CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${ANDROID_API}-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=amd64 CC="$CC" \
            go test -c -o "$GITHUB_WORKSPACE/gosttls.test" ./gosttls
      - name: Build handshake e2e binary (android/amd64)
        if: steps.detect.outputs.present == 'true'
        working-directory: core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/openssl-android/x86_64/lib/pkgconfig:${{ github.workspace }}/gost-engine-android/x86_64/lib/pkgconfig
        run: |
          CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${ANDROID_API}-clang"
          CGO_ENABLED=1 GOOS=android GOARCH=amd64 CC="$CC" \
            go test -c -o "$GITHUB_WORKSPACE/goste2e.test" ./goste2e
      - name: Enable KVM
        if: steps.detect.outputs.present == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run self-test on emulator
        if: steps.detect.outputs.present == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.EMU_API }}
          arch: ${{ env.EMU_ARCH }}
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb push "$GITHUB_WORKSPACE/gosttls.test" /data/local/tmp/gosttls.test
            adb shell chmod 755 /data/local/tmp/gosttls.test
            adb shell "cd /data/local/tmp && TMPDIR=/data/local/tmp GVPN_REQUIRE_GOST=1 ./gosttls.test -test.run TestEngineSelfTest -test.v" | tee /tmp/out.txt
            grep -q '^--- PASS: TestEngineSelfTest' /tmp/out.txt
            adb push "$GITHUB_WORKSPACE/goste2e.test" /data/local/tmp/goste2e.test
            adb shell chmod 755 /data/local/tmp/goste2e.test
            adb shell "cd /data/local/tmp && TMPDIR=/data/local/tmp GVPN_REQUIRE_GOST=1 ./goste2e.test -test.run TestGOSTControlHandshake -test.v" | tee /tmp/e2e.txt
            grep -q '^--- PASS: TestGOSTControlHandshake' /tmp/e2e.txt
            adb shell "cd /data/local/tmp && TMPDIR=/data/local/tmp GVPN_REQUIRE_GOST=1 ./goste2e.test -test.run TestGOSTTunnelHTTP -test.v" | tee /tmp/tunnel.txt
            grep -q '^--- PASS: TestGOSTTunnelHTTP' /tmp/tunnel.txt

  ios:
    name: iOS client (gomobile)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect component
        id: detect
        run: |
          if [ -d client/ios ] && ls client/ios/*.xcodeproj >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::client/ios/ not implemented yet — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build gomobile .xcframework
        if: steps.detect.outputs.present == 'true'
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          gomobile bind -target=ios -o client/ios/Core.xcframework ./core/...
      - name: Xcode build
        if: steps.detect.outputs.present == 'true'
        working-directory: client/ios
        run: |
          xcodebuild -project gvpn.xcodeproj -scheme gvpn \
            -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO build
